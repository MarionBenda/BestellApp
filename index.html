<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style/standard-style.css" />
    <link rel="stylesheet" href="./style/style.css" />
    <link rel="stylesheet" href="./style/assets.css" />
    <link rel="stylesheet" href="./style/fonts.css" />
    <link rel="stylesheet" href="./style/basket.css" />
    <link rel="stylesheet" href="./style/dialog.css" />
    <link rel="stylesheet" href="./style/media-query.css" />
    <script src="./scripts/db.js"></script>

    <script src="./scripts/template.js"></script>

    <link
      rel="icon"
      type="image/png"
      href="./assets/icons/takeout_dining_icon_press.svg"
    />
    <title>LieferLust</title>
  </head>

  <body onload="init()">
    <header class="header-main">
      <div class="header-content">
        <img src="./assets/logos/main_logo.svg" alt="LieferLust Logo" />
        <img
          src="./assets/icons/menu_placeholder_icon.svg"
          alt="Icon für Menü"
        />
      </div>
    </header>
    <main>
      <section>
        <div class="main-img-container">
          <img
            class="main-img"
            src="./assets/img/header_img.jpg"
            alt=""
            aria-hidden="true"
          />
          <img
            class="main-img-logo"
            src="./assets/logos/logo_burger.svg"
            alt="Logo Burger"
          />
        </div>
        <div class="main-content">
          <div class="slogan">
            <h1 class="brand-name">
              <span class="highlight">Burger</span>House
            </h1>
            <div class="rating-container">
              <img
                src="./assets/icons/star_icon.svg"
                alt="Stern Bewertungs Icon"
              />
              <span class="rating-value" id="ratingValue"></span>
              <span class="rating-count" id="ratingCount">(215)</span>
            </div>
          </div>
          <p>
            The best of Burgers, Pizza, and Greens, all in one greate place.
          </p>
        </div>

        <nav class="sub-nav" aria-label="Kategorieauswahl">
          <a href="#burger">Burger</a>
          <a href="#pizza">Pizza</a>
          <a href="#salad">Salate</a>
          <a href="#sideDishes">Beilagen</a>
          <a href="#desserts">Desserts</a>
        </nav>
      </section>

      <div class="main-layout-wrapper">
        <div class="menu-sections-container">
          <section class="order-section">
            <div class="food-content-headline"></div>
            <header class="section-header container container-mobile">
              <img
                class="header-icon"
                src="./assets/icons/burger_icon.svg"
                alt="Burger Icon"
              />

              <h2 class="section-headline">Burger</h2>
            </header>
            <div class="menu-content">
              <div class="dishes" id="burger"></div>
            </div>
          </section>
          <section class="order-section">
            <div class="food-content-headline"></div>
            <header class="section-header container container-mobile">
              <img
                class="header-icon"
                src="./assets/logos/pizza_logo.svg"
                alt="Pizza Icon"
              />

              <h2 class="section-headline">Pizza</h2>
            </header>
            <div class="menu-content">
              <div class="dishes" id="pizza"></div>
            </div>
          </section>
          <section class="order-section">
            <div class="food-content-headline"></div>
            <header class="section-header container container-mobile">
              <img
                class="header-icon"
                src="./assets/logos/salad_logo.svg"
                alt="Salat Icon"
              />

              <h2 class="section-headline">Salate</h2>
            </header>
            <div class="menu-content">
              <div class="dishes" id="salad"></div>
            </div>
          </section>
          <section class="order-section">
            <div class="food-content-headline"></div>
            <header class="section-header container container-mobile">
              <img
                class="header-icon"
                src="./assets/logos/potato-icon.png"
                alt="Beilagen Icon"
              />

              <h2 class="section-headline">Beilagen</h2>
            </header>
            <div class="menu-content">
              <div class="dishes" id="sideDishes"></div>
            </div>
          </section>
          <section class="order-section">
            <div class="food-content-headline"></div>
            <header class="section-header container container-mobile">
              <img
                class="header-icon"
                src="./assets/logos/macarons-color-icon.png"
                alt="Dessert Icon"
              />

              <h2 class="section-headline">Desserts</h2>
            </header>
            <div class="menu-content">
              <div class="dishes" id="desserts"></div>
            </div>
          </section>

          <button
            class="basket-sidebar-trigger"
            class="basket-count-badge"
            onclick="toggleBasket()"
          >
            <img
              src="./assets/icons/shopping_cart_icon_full.svg"
              alt="Warenkorb"
            />
            <span class="basket-count-badge basket-badge">0</span>
          </button>

          <div class="basket-overlay" onclick="toggleBasket()"></div>
        </div>
        <aside id="main-basket" class="basket" aria-labelledby="basket-title">
          <div class="basket-header-row">
            <div class="method-switch">
              <button
                id="btn-delivery"
                class="method-btn active"
                onclick="setDelivery(true)"
              >
                Lieferung
              </button>
              <button
                id="btn-pickup"
                class="method-btn"
                onclick="setDelivery(false)"
              >
                Abholung
              </button>
            </div>
            <h2>Warenkorb</h2>
          </div>

          <div id="basket_content"></div>
          <div id="basket_items" class="basket-content"></div>
          <div id="basket_total" class="basket-total"></div>
          <button class="basket-button" onclick="openDelivery()">
            <span>Buy Now</span>
            <span id="total_btn_price"></span>
          </button>
        </aside>
      </div>
    </main>

    <dialog id="orderConfirmation" class="order-dialog">
      <header class="header-dialog">
        <button id="closeButton" onclick="closeDelivery()" class="close-btn">
          <img src="./assets/icons/close-icon.svg" alt="Schließbutton" />
        </button>
      </header>
      <div class="dialog-order-content">
        <img
          src="./assets/icons/delivery_icon.svg"
          alt="Bestellung auf dem Weg"
        />
        <p class="dialog-order-content-first">Bestellung bestätigt!</p>
        <p class="dialog-order-content-second">
          Deine Bestellung ist auf dem Weg!
        </p>
      </div>
    </dialog>

    <footer class="footer">
      <div class="footer-content">
        <div class="copyright">
          <img src="./assets/icons/copyright_icon.svg" alt="Logo Copyright" />
          <p class="copyright-content">2025 LieferLust</p>
        </div>
        <a href="#">Impressum</a>
        <a href="#">Cookie Preference</a>
      </div>
    </footer>

    <nav class="mobile-nav" aria-label="Hauptnavigation mobil">
      <a
        href="index.html"
        class="nav-item"
        aria-label="Zurück zum Anfang der Seite"
      >
        <img
          class="default-icon"
          src="./assets/icons/home_icon.svg"
          alt="Home"
        />
        <img
          class="hover-icon"
          src="./assets/icons/home_icon_press.svg"
          alt=""
        />
      </a>

      <button aria-label="Profil öffnen" class="nav-item">
        <img
          class="default-icon"
          src="./assets/icons/profile_icon.svg"
          alt="Profil"
        />
        <img class="hover-icon" src="./assets/icons/profile_press.svg" alt="" />
      </button>
      <button aria-label="Speisekarte" class="nav-item">
        <img
          class="default-icon"
          src="./assets/icons/takeout_dining_2.svg"
          alt="Karte"
        />
        <img
          class="hover-icon"
          src="./assets/icons/takeout_dining_icon_press.svg"
          alt=""
        />
      </button>
      <button
        aria-label="Warenkorb öffnen"
        class="nav-item"
        onclick="toggleBasket()"
      >
        <img
          class="default-icon"
          src="./assets/icons/shopping_cart_icon.svg"
          alt=""
        />
        <img
          class="hover-icon"
          src="./assets/icons/shopping_cart_icon_press.svg"
          alt="Warenkorb"
        />
        <span class="basket-count-badge basket-badge">0</span>
      </button>
    </nav>
  </body>
  <script src="./scripts/script.js"></script>
</html>
